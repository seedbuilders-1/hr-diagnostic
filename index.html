<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seedbuilders AI Diagnostic — Select Institution</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #ffffff;
        --bg-secondary: #f7f6f2;
        --bg-info: #e6f1fb;
        --bg-success: #eaf3de;
        --bg-warning: #faeeda;
        --bg-danger: #fcebeb;
        --text-primary: #1a1a18;
        --text-secondary: #5f5e5a;
        --text-tertiary: #9b9a94;
        --text-info: #0c447c;
        --text-success: #27500a;
        --text-warning: #633806;
        --text-danger: #791f1f;
        --border: rgba(0, 0, 0, 0.12);
        --border-md: rgba(0, 0, 0, 0.22);
        --border-info: rgba(24, 95, 165, 0.35);
        --border-success: rgba(59, 109, 17, 0.3);
        --radius-md: 8px;
        --radius-lg: 12px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1c1a;
          --bg-secondary: #252523;
          --bg-info: #042c53;
          --bg-success: #173404;
          --bg-warning: #412402;
          --bg-danger: #501313;
          --text-primary: #e8e6de;
          --text-secondary: #a8a69e;
          --text-tertiary: #6e6c66;
          --text-info: #85b7eb;
          --text-success: #97c459;
          --text-warning: #ef9f27;
          --text-danger: #f09595;
          --border: rgba(255, 255, 255, 0.1);
          --border-md: rgba(255, 255, 255, 0.2);
          --border-info: rgba(133, 183, 235, 0.3);
        }
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg-secondary);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 2rem 1rem 4rem;
      }
      .card {
        background: var(--bg);
        border: 0.5px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 2rem;
        width: 100%;
        max-width: 600px;
      }
      .brand {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-tertiary);
        margin-bottom: 6px;
      }
      h1 {
        font-size: 22px;
        font-weight: 500;
        color: var(--text-primary);
        line-height: 1.3;
        margin-bottom: 8px;
      }
      .subtitle {
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 1.65;
        margin-bottom: 2rem;
      }
      .divider {
        border: none;
        border-top: 0.5px solid var(--border);
        margin: 1.5rem 0;
      }
      .pick-label {
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-tertiary);
        margin-bottom: 1rem;
      }
      .choice-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
        margin-bottom: 2rem;
      }
      @media (max-width: 460px) {
        .choice-grid {
          grid-template-columns: 1fr;
        }
      }
      .choice-btn {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        background: var(--bg);
        border: 0.5px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
        text-align: left;
        font-family: inherit;
        width: 100%;
      }
      .choice-btn:hover {
        border-color: var(--border-info);
        background: var(--bg-info);
      }
      .choice-icon {
        font-size: 32px;
        line-height: 1;
      }
      .choice-name {
        font-size: 16px;
        font-weight: 500;
        color: var(--text-primary);
      }
      .choice-desc {
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.5;
      }
      .choice-btn:hover .choice-name {
        color: var(--text-info);
      }
      .choice-btn:hover .choice-desc {
        color: var(--text-info);
        opacity: 0.8;
      }
      .footer-note {
        font-size: 12px;
        color: var(--text-tertiary);
        text-align: center;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">Seedbuilders</div>
      <h1>Diagnostic Tool</h1>
      <p class="subtitle">
        Select your institution type below. You'll be guided through a
        department-level diagnostic.
      </p>
      <div class="divider"></div>
      <div class="pick-label">Select</div>
      <div class="choice-grid">
        <button class="choice-btn" onclick="window.location.href = 'hr.html'">
          <span class="choice-icon">🏨</span>
          <div class="choice-name">HR</div>
          <div class="choice-desc">For HR</div>
        </button>
        <button class="choice-btn" onclick="window.location.href = 'team.html'">
          <span class="choice-icon">🏫</span>
          <div class="choice-name">Team</div>
          <div class="choice-desc">For teams</div>
        </button>
      </div>
      <p class="footer-note">
        Each diagnostic takes about 5–10 minutes. Your responses are reviewed by
        our team and a personalised report is sent to you within 24 hours.
      </p>
    </div>
  </body>
</html>
